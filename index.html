<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenotazione Tavolo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1>RUES 45 <span>WINE GARDEN</span></h1>
        <p>Inserisci i tuoi dati per ricevere il biglietto digitale con il QR Code.</p>
        
        <form id="bookingForm">
            <!-- Nome -->
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Es. Mario" required>
            </div>

            <!-- Cognome -->
            <div class="form-group">
                <label for="cognome">Cognome</label>
                <input type="text" id="cognome" name="cognome" placeholder="Es. Rossi" required>
            </div>

            <!-- Numero di Telefono -->
            <div class="form-group">
                <label for="telefono">Numero di Telefono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Es. 3331234567" required>
            </div>

            <!-- Data e Ora della prenotazione -->
            <div class="form-group">
                <label for="dataOra">Data e Ora della prenotazione</label>
                <input type="datetime-local" id="dataOra" name="dataOra" required>
            </div>

            <!-- Numero di persone -->
            <div class="form-group">
                <label for="persone">Numero di persone</label>
                <input type="number" id="persone" name="persone" min="1" max="20" placeholder="Es. 4" required>
            </div>

            <button type="submit" id="submitBtn">Invia Prenotazione</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
